name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/server/requirements.txt
      - run: pip install -r apps/server/requirements.txt
      - run: pip install ruff
      - run: cd apps/server && ruff check .

  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_blog
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_blog
      REDIS_URL: redis://localhost:6379
      JWT_SECRET_KEY: test-secret-key-for-ci
      JWT_REFRESH_SECRET_KEY: test-refresh-secret-key-for-ci
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/server/requirements.txt
      - run: pip install -r apps/server/requirements.txt
      - run: pip install pytest-cov
      - run: cd apps/server && python -m pytest --cov=app --cov-report=xml --cov-report=term-missing -v
      - uses: codecov/codecov-action@v4
        if: always()
        with:
          files: apps/server/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - run: cd apps/web && npm ci
      - run: cd apps/web && npx eslint src/ --ext .vue,.ts,.tsx
      - run: cd apps/web && npx vue-tsc --noEmit

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - run: cd apps/web && npm ci
      - run: cd apps/web && npm run test:coverage
      - uses: codecov/codecov-action@v4
        if: always()
        with:
          files: apps/web/coverage/coverage-final.json
          token: ${{ secrets.CODECOV_TOKEN }}

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/server/Dockerfile
          push: false
          tags: blog-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: false
          tags: blog-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
